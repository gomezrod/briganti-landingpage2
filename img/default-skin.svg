<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="264" height="88" viewBox="0 0 264 88">
  <defs>
    <style>
      .tile { fill: none; }
      .bg { fill: #ffffff; }
      .icon { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #111; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <!-- Row 0 (y:0) - reserved -->
  <rect x="0" y="0" width="44" height="44" class="bg" />
  <rect x="44" y="0" width="44" height="44" class="bg" />
  <rect x="88" y="0" width="44" height="44" class="bg" />
  <rect x="132" y="0" width="44" height="44" class="bg" />
  <rect x="176" y="0" width="44" height="44" class="bg" />
  <rect x="220" y="0" width="44" height="44" class="bg" />

  <!-- Row 1 (y:44) - controls used by PhotoSwipe -->
  <!-- col 0: Close -->
  <rect x="0" y="44" width="44" height="44" class="bg" />
  <text x="22" y="66" class="icon">✕</text>
  <!-- col 1: Share -->
  <rect x="44" y="44" width="44" height="44" class="bg" />
  <text x="66" y="66" class="icon">↗</text>
  <!-- col 2: Arrow Right (used by background-position -88 -44) -->
  <rect x="88" y="44" width="44" height="44" class="bg" />
  <text x="110" y="66" class="icon">▶</text>
  <!-- col 3: Arrow Left (used by -132 -44) -->
  <rect x="132" y="44" width="44" height="44" class="bg" />
  <text x="154" y="66" class="icon">◀</text>
  <!-- col 4: Zoom (placeholder) -->
  <rect x="176" y="44" width="44" height="44" class="bg" />
  <text x="198" y="66" class="icon">🔍</text>
  <!-- col 5: Fullscreen/other -->
  <rect x="220" y="44" width="44" height="44" class="bg" />
  <text x="242" y="66" class="icon">⤢</text>
</svg>
